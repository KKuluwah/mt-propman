<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Notify Payment -- Mayemou Trading</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: Arial, sans-serif; background: #f4f7fb; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
  .card { background: #fff; border-radius: 12px; padding: 32px 28px; width: 100%; max-width: 420px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
  .header { background: #0d2137; margin: -32px -28px 24px; padding: 20px 28px; border-radius: 12px 12px 0 0; }
  .logo { display: flex; align-items: center; gap: 14px; }
  .logo img { width: 48px; height: 48px; object-fit: cover; border-radius: 8px; border: 2px solid #c8922a; }
  .logo-text { color: #fff; font-size: 15px; font-weight: 700; }
  .logo-sub { color: rgba(255,255,255,0.5); font-size: 11px; }
  h2 { font-size: 18px; color: #0d2137; margin-bottom: 6px; }
  p.sub { font-size: 13px; color: #888; margin-bottom: 20px; }
  label { display: block; font-size: 12px; font-weight: 700; color: #555; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 5px; }
  input, textarea { width: 100%; padding: 10px 12px; border: 1.5px solid #dde3ed; border-radius: 7px; font-size: 14px; margin-bottom: 14px; outline: none; font-family: Arial, sans-serif; transition: border 0.2s; }
  input:focus, textarea:focus { border-color: #0d2137; }
  textarea { resize: vertical; min-height: 70px; }
  button { width: 100%; padding: 12px; background: #0d2137; color: #fff; border: none; border-radius: 7px; font-size: 15px; font-weight: 700; cursor: pointer; transition: background 0.2s; }
  button:hover { background: #1a3a5c; }
  button:disabled { background: #aaa; cursor: not-allowed; }
  .success { background: #d1fae5; color: #065f46; padding: 14px; border-radius: 8px; font-size: 14px; text-align: center; display: none; margin-bottom: 16px; }
  .error { background: #fee2e2; color: #b22a2a; padding: 14px; border-radius: 8px; font-size: 14px; display: none; margin-bottom: 16px; }
  .required { color: #b22a2a; }
</style>
</head>
<body>
<div class="card">
  <div class="header">
    <div class="logo">
      <img src="/uploads/mt-logo.jpg" alt="Mayemou Trading" onerror="this.style.display='none'">
      <div>
        <div class="logo-text">Mayemou Trading</div>
        <div class="logo-sub">Property Management</div>
      </div>
    </div>
  </div>

  <h2>Notify Payment</h2>
  <p class="sub">Fill in your payment details below. Your property manager will be notified and send you a receipt.</p>

  <div class="success" id="success">
    Thank you! Your payment notification has been sent. Your property manager will verify and send your receipt shortly.
  </div>
  <div class="error" id="error"></div>

  <form id="form">
    <label>Your Full Name <span class="required">*</span></label>
    <input type="text" id="tenant_name" placeholder="e.g. John Smith" required>

    <label>Invoice Number <span class="required">*</span></label>
    <input type="text" id="invoice_no" placeholder="e.g. MT-INV-2026-001" required>

    <label>Amount Paid (K) <span class="required">*</span></label>
    <input type="number" id="amount" placeholder="e.g. 2000" required>

    <label>Date Paid <span class="required">*</span></label>
    <input type="date" id="payment_date" required>

    <label>Bank Reference / Transaction ID</label>
    <input type="text" id="bank_reference" placeholder="e.g. BSP ref number">

    <label>Notes (optional)</label>
    <textarea id="notes" placeholder="Any additional information..."></textarea>

    <button type="submit" id="btn">Send Notification</button>
  </form>
</div>

<script>
  document.getElementById('payment_date').value = new Date().toISOString().split('T')[0];

  document.getElementById('form').onsubmit = async (e) => {
    e.preventDefault();
    const btn = document.getElementById('btn');
    const success = document.getElementById('success');
    const error = document.getElementById('error');
    error.style.display = 'none';
    btn.disabled = true;
    btn.textContent = 'Sending...';

    const res = await fetch('/api/notifications/pay-notify', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        tenant_name: document.getElementById('tenant_name').value.trim(),
        invoice_no: document.getElementById('invoice_no').value.trim(),
        amount: document.getElementById('amount').value,
        payment_date: document.getElementById('payment_date').value,
        bank_reference: document.getElementById('bank_reference').value.trim(),
        notes: document.getElementById('notes').value.trim()
      })
    });

    const data = await res.json();
    if (res.ok) {
      document.getElementById('form').style.display = 'none';
      success.style.display = 'block';
    } else {
      error.textContent = data.error || 'Something went wrong. Please try again.';
      error.style.display = 'block';
      btn.disabled = false;
      btn.textContent = 'Send Notification';
    }
  };
</script>
</body>
</html>
