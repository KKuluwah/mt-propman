<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>MT-PropMan — Login</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: Arial, sans-serif; background: #0d2137; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
  .card { background: #fff; border-radius: 12px; padding: 40px 36px; width: 100%; max-width: 380px; box-shadow: 0 8px 32px rgba(0,0,0,0.3); }
  .logo { display: flex; align-items: center; gap: 12px; margin-bottom: 28px; }
  .logo-icon { background: #c8922a; width: 44px; height: 44px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 18px; color: #fff; flex-shrink: 0; }
  .logo-text { font-size: 16px; font-weight: 700; color: #0d2137; line-height: 1.2; }
  .logo-sub { font-size: 12px; color: #888; font-weight: 400; }
  h2 { font-size: 20px; color: #0d2137; margin-bottom: 20px; }
  label { display: block; font-size: 13px; font-weight: 600; color: #444; margin-bottom: 5px; }
  input { width: 100%; padding: 10px 12px; border: 1px solid #ddd; border-radius: 7px; font-size: 14px; margin-bottom: 16px; outline: none; transition: border 0.2s; }
  input:focus { border-color: #0d2137; }
  button { width: 100%; padding: 11px; background: #0d2137; color: #fff; border: none; border-radius: 7px; font-size: 15px; font-weight: 600; cursor: pointer; transition: background 0.2s; }
  button:hover { background: #1a3a5c; }
  .error { background: #fee2e2; color: #b22a2a; padding: 10px 12px; border-radius: 7px; font-size: 13px; margin-bottom: 16px; display: none; }
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="logo-icon">MT</div>
    <div class="logo-text">MT-PropMan<div class="logo-sub">Property Management</div></div>
  </div>
  <h2>Admin Login</h2>
  <div class="error" id="err"></div>
  <form id="login-form">
    <label>Username</label>
    <input type="text" id="username" autocomplete="username" required>
    <label>Password</label>
    <input type="password" id="password" autocomplete="current-password" required>
    <button type="submit">Sign In</button>
  </form>
</div>
<script>
  document.getElementById('login-form').onsubmit = async (e) => {
    e.preventDefault();
    const err = document.getElementById('err');
    err.style.display = 'none';
    const res = await fetch('/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        username: document.getElementById('username').value,
        password: document.getElementById('password').value
      })
    });
    const data = await res.json();
    if (res.ok) {
      window.location.href = '/';
    } else {
      err.textContent = data.error || 'Login failed.';
      err.style.display = 'block';
    }
  };
</script>
</body>
</html>
